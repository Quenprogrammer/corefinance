<div class="tabs-container fullscreen">
  <!-- Tab Headers - Desktop -->
  <div class="tabs-header desktop-tabs">
    <button
      *ngFor="let tab of tabs; let i = index"
      class="tab-btn"
      [class.active]="activeTab() === i"
      (click)="setActiveTab(i)">
      <i [class]="tab.icon"></i>
      <span>{{ tab.label }}</span>
      <span class="tab-badge" *ngIf="tab.badge">{{ tab.badge }}</span>
    </button>
  </div>

  <!-- Tab Headers - Mobile Dropdown -->
  <div class="mobile-tabs-header">
    <div class="mobile-tab-selector" (click)="toggleMobileMenu()">
      <i [class]="tabs[activeTab()]?.icon"></i>
      <span>MENU</span>
      <i class="bi bi-chevron-down" [class.rotated]="mobileMenuOpen()"></i>
    </div>
    <div class="mobile-tabs-dropdown" *ngIf="mobileMenuOpen()">
      <button
        *ngFor="let tab of tabs; let i = index"
        class="mobile-tab-btn"
        [class.active]="activeTab() === i"
        (click)="setActiveTab(i); closeMobileMenu()">
        <i [class]="tab.icon"></i>
        <span>{{ tab.label }}</span>
        <span class="tab-badge" *ngIf="tab.badge">{{ tab.badge }}</span>
      </button>
    </div>
  </div>

  <!-- Tab Content -->
