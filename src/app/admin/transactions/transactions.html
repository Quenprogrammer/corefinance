<div class="max-w-4xl mx-auto p-6">
  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800">
      {{ isEditing ? 'Edit Transaction' : 'New Transaction' }}
    </h1>
    <p class="text-gray-600 mt-1">Fill in the transaction details below</p>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="flex justify-center items-center h-64">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
  </div>

  <!-- Form -->
  <form *ngIf="!isLoading" [formGroup]="transactionForm" (ngSubmit)="onSubmit()" class="bg-white rounded-lg shadow-lg overflow-hidden">
    <div class="p-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Voucher Number -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Voucher Number
          </label>
          <input
            type="text"
            formControlName="voucherNo"
            readonly
            class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50 text-gray-600 font-mono"
          />
        </div>

        <!-- Transaction Date -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Transaction Date *
          </label>
          <input
            type="date"
            formControlName="transactionDate"
            [max]="today"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [class.border-red-500]="transactionDate?.invalid && transactionDate?.touched"
          />
          <div *ngIf="transactionDate?.invalid && transactionDate?.touched" class="text-red-500 text-xs mt-1">
            Transaction date is required
          </div>
        </div>

        <!-- Transaction Type -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Transaction Type *
          </label>
          <div class="flex gap-4">
            <label class="flex items-center cursor-pointer">
              <input
                type="radio"
                formControlName="transactionType"
                value="RECEIPT"
                class="mr-2 w-4 h-4 text-blue-600"
                (change)="onTypeChange('RECEIPT')"
              />
              <span>Receipt</span>
            </label>
            <label class="flex items-center cursor-pointer">
              <input
                type="radio"
                formControlName="transactionType"
                value="PAYMENT"
                class="mr-2 w-4 h-4 text-blue-600"
                (change)="onTypeChange('PAYMENT')"
              />
              <span>Payment</span>
            </label>
          </div>
        </div>

        <!-- Payee -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Payee *
          </label>
          <input
            type="text"
            formControlName="payeeName"
            list="payees"
            placeholder="Search or enter payee name"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [class.border-red-500]="payeeName?.invalid && payeeName?.touched"
          />
          <datalist id="payees">
            <option *ngFor="let payee of payees" [value]="payee.name">
              {{ payee.name }} ({{ payee.code }})
            </option>
          </datalist>
          <button
            type="button"
            (click)="addNewPayee()"
            class="text-blue-600 text-sm mt-1 hover:text-blue-800"
          >
            + Add New Payee
          </button>
        </div>

        <!-- Description -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Description *
          </label>
          <textarea
            formControlName="description"
            rows="3"
            placeholder="Enter transaction description"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [class.border-red-500]="description?.invalid && description?.touched"
          ></textarea>
          <div *ngIf="description?.invalid && description?.touched" class="text-red-500 text-xs mt-1">
            Description is required (minimum 5 characters)
          </div>
        </div>

        <!-- Category -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Category *
          </label>
          <select
            formControlName="category"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [class.border-red-500]="category?.invalid && category?.touched"
          >
            <option value="">Select Category</option>
            <option *ngFor="let cat of filteredCategories" [value]="cat.code">
              {{ cat.name }}
            </option>
          </select>
        </div>

        <!-- NCOA Code -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            NCOA Code *
          </label>
          <select
            formControlName="ncoaCode"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [class.border-red-500]="ncoaCode?.invalid && ncoaCode?.touched"
          >
            <option value="">Select NCOA Code</option>
            <option *ngFor="let code of ncoaCodes" [value]="code.code">
              {{ code.code }} - {{ code.name }}
            </option>
          </select>
        </div>

        <!-- Amount -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Amount (₦) *
          </label>
          <input
            type="number"
            formControlName="amount"
            step="0.01"
            placeholder="0.00"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [class.border-red-500]="amount?.invalid && amount?.touched"
          />
          <div *ngIf="amount?.invalid && amount?.touched" class="text-red-500 text-xs mt-1">
            Amount must be greater than 0
          </div>
        </div>

        <!-- Bank Account -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Bank Account *
          </label>
          <select
            formControlName="bankAccountId"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            [class.border-red-500]="bankAccountId?.invalid && bankAccountId?.touched"
          >
            <option value="">Select Bank Account</option>
            <option *ngFor="let bank of bankAccounts" [value]="bank.id">
              {{ bank.name }} - {{ bank.accountNumber }}
            </option>
          </select>
        </div>

        <!-- DVBN (for payments) -->
        <div *ngIf="transactionType?.value === 'PAYMENT'">
          <label class="block text-sm font-medium text-gray-700 mb-2">
            DVBN (Document Voucher Batch Number)
          </label>
          <input
            type="text"
            formControlName="dvbn"
            placeholder="Enter DVBN"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>

        <!-- TSA/Bank Reference (for receipts) -->
        <div *ngIf="transactionType?.value === 'RECEIPT'">
          <label class="block text-sm font-medium text-gray-700 mb-2">
            TSA/Bank Reference
          </label>
          <input
            type="text"
            formControlName="tsabank"
            placeholder="Enter TSA/Bank Reference"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>
      </div>
    </div>

    <!-- Form Actions -->
    <div class="px-6 py-4 bg-gray-50 border-t flex justify-end gap-3">
      <button
        type="button"
        (click)="onCancel()"
        class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-100 transition-colors"
      >
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="!transactionForm.valid || isSubmitting"
        class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
      >
        <svg *ngIf="isSubmitting" class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        {{ isEditing ? 'Update' : 'Save' }} Transaction
      </button>
    </div>
  </form>
</div>

<!-- Add Payee Modal -->
<div *ngIf="showPayeeModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" (click)="closePayeeModal()">
  <div class="bg-white rounded-lg p-6 w-96 max-w-md" (click)="$event.stopPropagation()">
    <h3 class="text-lg font-semibold mb-4">Add New Payee</h3>
    <div class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Payee Name *</label>
        <input
          type="text"
          [(ngModel)]="newPayeeName"
          placeholder="Enter payee name"
          class="w-full px-3 py-2 border border-gray-300 rounded-md"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Payee Code</label>
        <input
          type="text"
          [(ngModel)]="newPayeeCode"
          placeholder="Enter code (optional)"
          class="w-full px-3 py-2 border border-gray-300 rounded-md"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
        <select [(ngModel)]="newPayeeType" class="w-full px-3 py-2 border border-gray-300 rounded-md">
          <option value="EMPLOYEE">Employee</option>
          <option value="COMPANY">Company</option>
          <option value="BANK">Bank</option>
          <option value="OTHER">Other</option>
        </select>
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-6">
      <button (click)="closePayeeModal()" class="px-3 py-1 border border-gray-300 rounded-md hover:bg-gray-100">
        Cancel
      </button>
      <button (click)="saveNewPayee()" class="px-3 py-1 bg-blue-600 text-white rounded-md hover:bg-blue-700">
        Save Payee
      </button>
    </div>
  </div>
</div>
