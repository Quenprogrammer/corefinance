<div class="container-fluid py-4" style="background: #1e1e2e;">
  <!-- Modern Header with Actions -->
  <div class="dashboard-header">
    <div class="header-content-wrapper">
      <div class="title-section">
        <div class="title-icon">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z" fill="currentColor"/>
          </svg>
        </div>
        <div class="title-text">
          <h1>Government Cashbook System</h1>
          <p>Manage and track government financial transactions</p>
        </div>
      </div>
      <div class="action-buttons-group">
        <button class="action-btn export-btn" (click)="exportData()">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/>
          </svg>
          <span>Export CSV</span>
        </button>
        <button class="action-btn print-btn" (click)="printReport()">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z" fill="currentColor"/>
          </svg>
          <span>Print</span>
        </button>

      </div>
    </div>
  </div>

  <!-- Stats Dashboard -->
  <app-dashboard-stats [stats]="stats()"></app-dashboard-stats>

  <!-- Loading Spinner -->
  <app-loading-spinner *ngIf="loading()"></app-loading-spinner>

  <!-- Error Alert -->
  <div *ngIf="error()" class="alert alert-danger alert-dismissible fade show" role="alert">
    {{error()}}
    <button type="button" class="btn-close" (click)="clearError()"></button>
  </div>






  <!-- Reports Section -->
  <div class="row mt-4">
    <div class="col-12 mb-4">

    </div>
  </div>
</div>
